<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Number Guessing Game</title>
</head>

<body>
    <div class="container">
        <h2>Guess the Number</h2>
        <div class="ctop">
            <input type="number" id="guess" placeholder="1 - 10" autofocus>
            <button id="btn">Guess</button>
        </div>
        <div class="cbottom">
            <p id="hint">Hint: Guess a number!</p>
            <p id="attempt">Attempts: 0</p>
        </div>
    </div>
    <script src="file.js"></script>
</body>

</html>
